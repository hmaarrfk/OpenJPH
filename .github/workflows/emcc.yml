name: Build with EMCC

on:
  push:
  pull_request:
    types: [opened, reopened]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure emcc
        uses: mymindstorm/setup-emsdk@v14
        with:
          actions-cache-folder: 'emsdk-cache'

      - name: Build non-SIMD and Debug
        run: bash scripts/ci-emcc-build.sh ON Debug

      - name: Build non-SIMD and Release
        run: bash scripts/ci-emcc-build.sh ON Release

      - name: Build SIMD and Debug
        run: bash scripts/ci-emcc-build.sh OFF Debug

      - name: Build SIMD and Release
        run: bash scripts/ci-emcc-build.sh OFF Release
